name: Build Mumla (Falconclaw PTT)

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Use stable debug signing key (so updates install cleanly)
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      - name: Install SDK packages (platform 36, build-tools, NDK 25.1.8937393)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;25.1.8937393"

      - name: Clone Mumla at pinned commit (with submodules)
        run: |
          git clone --recurse-submodules https://gitlab.com/quite/mumla.git mumla
          cd mumla
          git checkout 68a83111071d413557fbb523d8f546de1c5b19e1
          git submodule update --init --recursive

      - name: Apply Falconclaw PTT changes (BLE hold-to-talk)
        run: |
          cp MumlaService.java mumla/app/src/main/java/se/lublin/mumla/service/MumlaService.java
          cp MumlaActivity.java mumla/app/src/main/java/se/lublin/mumla/app/MumlaActivity.java
          cp AndroidManifest.xml mumla/app/src/main/AndroidManifest.xml
          grep -n "FCPTT BLE" mumla/app/src/main/java/se/lublin/mumla/service/MumlaService.java | head -1
          grep -n "BLUETOOTH_CONNECT" mumla/app/src/main/AndroidManifest.xml

      - name: Use distinct package id + label (install alongside stock Mumla)
        run: |
          sed -i 's/applicationId "se.lublin.mumla"/applicationId "se.lublin.mumla.falconclaw"/g' mumla/app/build.gradle
          sed -i 's#<string name="app_name">Mumla</string>#<string name="app_name">Mumla FC</string>#g' mumla/app/src/main/res/values/strings_notranslate.xml
          grep -n "applicationId" mumla/app/build.gradle

      - name: Give Gradle enough heap
        working-directory: mumla
        run: echo "org.gradle.jvmargs=-Xmx5g -Dfile.encoding=UTF-8" >> gradle.properties

      - name: Build bundled crypto (spongycastle) jars
        working-directory: mumla
        run: |
          chmod +x gradlew libraries/humla/gradlew
          ( cd libraries/humla/libs/humla-spongycastle && ../../gradlew jar --no-daemon --stacktrace )

      - name: Build foss debug APK
        working-directory: mumla
        run: ./gradlew assembleFossDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp mumla/app/build/outputs/apk/foss/debug/*.apk out/mumla-falconclaw-ptt.apk
          ls -la out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mumla-falconclaw-foss-debug
          path: out/mumla-falconclaw-ptt.apk
          if-no-files-found: error

      - name: Publish APK to Release (for easy phone download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Falconclaw PTT build
          files: out/mumla-falconclaw-ptt.apk
